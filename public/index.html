function OnlineLobby({onBack,savedDecks,onSaveDecks}){
  const [mode,setMode]=useState('menu');
  const [playerName,setPlayerName]=useState('');
  const [roomId,setRoomId]=useState('');
  const [inputRoom,setInputRoom]=useState('');
  const [roomInfo,setRoomInfo]=useState(null);
  const [mulHand,setMulHand]=useState([]);
  const [mulSel,setMulSel]=useState(new Set());
  const [onlineG,setOnlineG]=useState(null);
  const [onlineMyPi,setOnlineMyPi]=useState(null);
  const [errMsg,setErrMsg]=useState('');
  const [playerDeck,setPlayerDeck]=useState(null);
  const [deckScreen,setDeckScreen]=useState(false);
  const sockRef=useRef(null);

  useEffect(()=>{
    if(typeof io==='undefined'){
      setErrMsg('Socket.ioが読み込まれていません');
      return;
    }
    let sock=null;
    // SERVER_URL の非同期解決を待ってから接続
    resolveServerURL().then(url=>{
      sock=io(url,{
        transports:['websocket','polling'],
        reconnection:true,
        reconnectionAttempts:5,
        reconnectionDelay:1000,
      });
      sockRef.current=sock;
      sock.on('connect',()=>{
        setErrMsg('');
        console.log('[Grimoire] Connected to',url);
      });
      sock.on('connect_error',(e)=>{
        setErrMsg(`サーバーに接続できません (${url})`);
        console.error('[Grimoire] connect_error',e.message);
      });
      sock.on('disconnect',(reason)=>{
        if(reason!=='io client disconnect')setErrMsg('サーバーとの接続が切れました');
      });
      sock.on('error',msg=>setErrMsg(msg));
      sock.on('roomCreated',({roomId:id})=>{setRoomId(id);setMode('wait');});
      sock.on('roomJoined',({roomId:id,myPi:pi})=>{setRoomId(id);setOnlineMyPi(pi);setMode('wait');});
      sock.on('roomInfo',info=>setRoomInfo(info));
      sock.on('mulliganStart',({hand,myPi:pi})=>{setMulHand(hand);setOnlineMyPi(pi);setMulSel(new Set());setMode('mulligan');});
      sock.on('state',({G,myPi:pi})=>{setOnlineG(G);setOnlineMyPi(pi);setMode('game');});
      sock.on('gameOver',({winnerName,reason})=>{alert(`${winnerName} の勝利！${reason?'\n'+reason:''}`);});
      sock.on('opponentLeft',({msg})=>{setErrMsg(msg);setMode('menu');});
    });
    return()=>{if(sock)sock.disconnect();};
  },[]);

  function emit(ev,data){sockRef.current&&sockRef.current.emit(ev,data);}
  function sendAction(type,payload={}){emit('action',{type,payload});}
  function doCreate(){if(!playerName.trim()){setErrMsg('名前を入力してください');return;}setErrMsg('');emit('createRoom',{name:playerName,deck:playerDeck});}
  function doJoin(){if(!playerName.trim()||!inputRoom.trim()){setErrMsg('名前とルームIDを入力してください');return;}setErrMsg('');emit('joinRoom',{roomId:inputRoom.trim().toUpperCase(),name:playerName,deck:playerDeck});}
  function doReady(){emit('ready',{deck:playerDeck});}
  function doMulConfirm(){emit('mulliganDone',{sel:[...mulSel]});setMode('wait');}

  if(deckScreen)return h(DeckBuilder,{onBack:()=>setDeckScreen(false),onPlay:(d)=>{setPlayerDeck(d);setDeckScreen(false);},savedDecks,onSaveDecks});
  if(mode==='game'&&onlineG)return h(GameScreen,{initG:onlineG,isAI:false,isOnline:true,myOnlinePi:onlineMyPi,onAction:sendAction});
  if(mode==='mulligan')return h(OnlineMulliganScreen,{hand:mulHand,sel:mulSel,setSel:setMulSel,onConfirm:doMulConfirm,myPi:onlineMyPi});

  const nameBox=h('input',{value:playerName,onChange:e=>setPlayerName(e.target.value),placeholder:'プレイヤー名',
    style:{fontSize:'13px',padding:'8px 12px',borderRadius:'5px',border:'1px solid var(--borderG)',background:'var(--bg3)',color:'var(--text)',fontFamily:'inherit',width:'200px'}});
  const errDiv=errMsg&&h('div',{style:{color:'#f84',fontSize:'12px',margin:'4px'}},'⚠ '+errMsg);

  if(mode==='menu')return h('div',{className:'title-screen'},
    h('div',{className:'logo'},h('h1',null,'オンライン対戦'),h('div',{className:'logo-en'},'ONLINE MATCH'),
      h('div',{style:{fontSize:'9px',color:'var(--faint)',marginTop:'4px',fontFamily:'monospace'}},`接続先: ${SERVER_URL}`)
    ),
    errDiv,
    h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',alignItems:'center',marginBottom:'10px'}},
      nameBox,
      h('button',{className:'mbtn',style:{width:'220px',fontSize:'11px',padding:'7px'},onClick:()=>setDeckScreen(true)},playerDeck?'🃏 デッキ設定済み（変更）':'🃏 デッキを選ぶ（任意）')
    ),
    h('div',{className:'title-menu'},
      h('button',{className:'mbtn primary',onClick:()=>setMode('create')},'🏠 ルームを作成'),
      h('button',{className:'mbtn',onClick:()=>setMode('join')},'🚪 ルームに参加'),
      h('button',{className:'mbtn sm',onClick:onBack},'← タイトルへ戻る')
    )
  );

  if(mode==='create')return h('div',{className:'title-screen'},
    h('div',{className:'logo'},h('h1',null,'ルーム作成')),errDiv,
    h('div',{className:'title-menu'},nameBox,
      h('button',{className:'mbtn primary',onClick:doCreate},'ルームを作成する'),
      h('button',{className:'mbtn sm',onClick:()=>setMode('menu')},'← 戻る'))
  );

  if(mode==='join')return h('div',{className:'title-screen'},
    h('div',{className:'logo'},h('h1',null,'ルームに参加')),errDiv,
    h('div',{className:'title-menu'},nameBox,
      h('input',{value:inputRoom,onChange:e=>setInputRoom(e.target.value.toUpperCase()),placeholder:'ルームID（6文字）',maxLength:6,
        style:{fontSize:'18px',padding:'8px 12px',borderRadius:'5px',border:'1px solid var(--goldD)',background:'var(--bg3)',color:'var(--goldL)',fontFamily:'monospace',width:'200px',textAlign:'center',letterSpacing:'4px'}}),
      h('button',{className:'mbtn primary',onClick:doJoin},'参加する'),
      h('button',{className:'mbtn sm',onClick:()=>setMode('menu')},'← 戻る'))
  );

  if(mode==='wait')return h('div',{className:'title-screen'},
    h('div',{className:'logo'},
      h('h1',null,'待機中...'),
      roomId&&h('div',{style:{fontSize:'32px',color:'var(--goldL)',letterSpacing:'8px',margin:'12px 0',fontFamily:'monospace',background:'var(--bg3)',padding:'12px 24px',borderRadius:'8px',border:'1px solid var(--goldD)'}},roomId),
      h('div',{style:{fontSize:'10px',color:'var(--muted)'}},'このIDを相手に伝えてください')
    ),
    roomInfo&&h('div',{style:{display:'flex',gap:'20px',justifyContent:'center',margin:'16px 0'}},
      roomInfo.players.map((p,i)=>h('div',{key:i,style:{padding:'12px 20px',borderRadius:'7px',minWidth:'120px',textAlign:'center',background:p.ready?'rgba(48,160,80,.2)':'var(--bg3)',border:`1px solid ${p.ready?'#38a068':'var(--border)'}`}},
        h('div',{style:{fontWeight:'bold',color:'var(--text)',marginBottom:'4px'}},p.name||`P${i+1}`),
        h('div',{style:{fontSize:'12px',color:p.ready?'#6eda98':'var(--muted)'}},p.ready?'✅ 準備完了':'⏳ 待機中')
      ))
    ),
    errDiv,
    h('div',{className:'title-menu'},
      h('button',{className:'mbtn primary',onClick:doReady},'✅ 準備完了'),
      h('button',{className:'mbtn sm',onClick:()=>{sockRef.current&&sockRef.current.disconnect();onBack();}},'← 退出')
    )
  );

  return null;
}

// ── Electronバージョンバッジ ──
function ElectronVersionBadge(){
  const [ver,setVer]=useState('');
  useEffect(()=>{
    if(window.electronAPI)window.electronAPI.getVersion().then(v=>setVer(v));
  },[]);
  return h('div',{style:{
    position:'fixed',bottom:'10px',right:'12px',
    fontSize:'9px',color:'var(--faint)',letterSpacing:'1px',pointerEvents:'none'
  }},`v${ver}`);
}

// ============================================================
// ROOT
// ============================================================
function App(){
  const [screen,setScreen]=useState('title');
  const [savedDecks,setSavedDecks]=useState(LS.load);
  const [isAI,setIsAI]=useState(false);
  const [playerDeck,setPlayerDeck]=useState(null);
  const [mulPl,setMulPl]=useState(null);
  const [gameG,setGameG]=useState(null);

  function handleSave(d){setSavedDecks(d);LS.save(d);}
  function startMul(c0,c1,ai){setMulPl(initPlayers(c0,c1));setIsAI(ai);setScreen('mulligan');}
  function onMulConfirm(sel){
    const pl=doMulligan(mulPl,sel);
    setGameG({players:pl,currentPlayer:0,phase:'draw',turn:1,winner:null,log:[{msg:'ゲーム開始！P1の先攻です',type:'hl',id:'init'}]});
    setScreen('game');
  }

  // Electronメニューからのタイトル遷移フック
  useEffect(()=>{window.__gotoTitle=()=>setScreen('title');},[]);

  if(screen==='title')return h('div',{className:'title-screen'},
    h('div',{className:'logo'},h('h1',null,'調理魔導書'),h('div',{className:'logo-en'},'《 RECIPE GRIMOIRE 》'),h('div',{className:'logo-tagline'},'食材とレシピを集め、先に"満腹"を叩き込め')),
    h('div',{className:'title-menu'},
      h('button',{className:'mbtn primary',onClick:()=>setScreen('deckbuild')},'🃏 デッキを構築して対戦'),
      h('button',{className:'mbtn',onClick:()=>startMul(null,null,true)},'🤖 クイックスタート（VS AI）'),
      h('button',{className:'mbtn',onClick:()=>startMul(null,null,false)},'👥 クイックスタート（2人対戦）'),
      h('button',{className:'mbtn',style:{borderColor:'#4a8a4a',color:'#8ada8a'},onClick:()=>setScreen('online')},'🌐 オンライン対戦')
    ),
    h('div',{className:'title-note'},'食材デッキ30枚 ＋ レシピデッキ15枚　同名カードは最大4枚まで\n相手の満腹度を20にすると勝利！'),
    window.electronAPI&&h(ElectronVersionBadge,null)
  );
  if(screen==='deckbuild')return h(DeckBuilder,{onBack:()=>setScreen('title'),onPlay:(deck)=>{setPlayerDeck(deck);setScreen('deckbuild-mode');},savedDecks,onSaveDecks:handleSave});
  if(screen==='deckbuild-mode')return h('div',{className:'mode-select-screen'},
    h('div',{className:'logo',style:{marginBottom:'20px'}},h('h1',null,'対戦モード選択')),
    h('div',{className:'title-menu'},
      h('button',{className:'mbtn primary',onClick:()=>startMul(playerDeck,null,true)},'🤖 VS AI で対戦'),
      h('button',{className:'mbtn',onClick:()=>startMul(playerDeck,playerDeck,false)},'👥 2人対戦（同一画面）'),
      h('button',{className:'mbtn sm',onClick:()=>setScreen('deckbuild')},'← デッキ編集に戻る')
    )
  );
  if(screen==='mulligan')return h(MulliganScreen,{players:mulPl,onConfirm:onMulConfirm,isAI});
  if(screen==='game'&&gameG)return h(GameScreen,{initG:gameG,isAI});
  if(screen==='online')return h(OnlineLobby,{onBack:()=>setScreen('title'),savedDecks,onSaveDecks:handleSave});
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
